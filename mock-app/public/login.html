<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaxSurvey Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f4f6ff 0%, #eef8f7 100%);
      }

      .card {
        width: min(420px, 92vw);
        padding: 28px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.1);
      }

      .brand-logo {
        margin: 0 0 20px;
        color: #0f3e75;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .field {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: #2f2f2f;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccd1d9;
        border-radius: 8px;
        padding: 11px 12px;
        font-size: 0.95rem;
      }

      button {
        width: 100%;
        margin-top: 8px;
        border: none;
        border-radius: 8px;
        background: #0f3e75;
        color: #fff;
        padding: 12px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      .error {
        color: #b61e1e;
        font-size: 0.85rem;
        margin-top: 4px;
        min-height: 16px;
      }

      .error-message {
        color: #b61e1e;
        background: #ffeaea;
        border: 1px solid #ffc7c7;
        border-radius: 8px;
        margin-bottom: 10px;
        padding: 9px 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 class="brand-logo">MaxSurvey</h1>

      <div id="login-error" class="error-message" role="alert">
        Invalid email or password
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" />
          <div id="email-error" class="error"></div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
          />
          <div id="password-error" class="error"></div>
        </div>

        <button type="submit" data-testid="login-button">Login</button>
      </form>
    </main>

    <script>
      const validCredentials = new Map([
        ["admin@maxsurvey.com", "Admin@123"],
        ["swaroop.gowda@halliburton.com", "10r_Onsteroids19972715"],
      ]);

      const form = document.getElementById("login-form");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const emailError = document.getElementById("email-error");
      const passwordError = document.getElementById("password-error");
      const loginError = document.getElementById("login-error");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        emailError.textContent = "";
        passwordError.textContent = "";
        loginError.style.display = "none";

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        let hasValidationError = false;

        if (!email) {
          emailError.textContent = "Email is required";
          hasValidationError = true;
        }

        if (!password) {
          passwordError.textContent = "Password is required";
          hasValidationError = true;
        }

        if (hasValidationError) {
          return;
        }

        if (validCredentials.get(email.toLowerCase()) === password) {
          window.location.assign("/dashboard");
          return;
        }

        loginError.textContent = "Invalid email or password";
        loginError.style.display = "block";
      });
    </script>
  </body>
</html>
