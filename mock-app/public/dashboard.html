<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(140deg, #fff5ef 0%, #f5f2ff 100%);
      }

      .panel {
        width: min(560px, 92vw);
        background: #fff;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h1 {
        margin-top: 0;
        color: #1a3759;
      }

      button {
        margin-top: 16px;
        border: none;
        border-radius: 8px;
        background: #b33636;
        color: #fff;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Dashboard</h1>
      <p>You are now logged in to MaxSurvey.</p>
      <button id="logout-btn" data-testid="logout" type="button">Logout</button>
    </main>

    <script>
      document.getElementById("logout-btn").addEventListener("click", () => {
        window.location.assign("/login");
      });
    </script>
  </body>
</html>
