name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Daily schedule main branch run (04:00 AM UTC)
 schedule:
  -cron: '0 4 * * *'


jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test:ui
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npx allure-commandline generate allure-results --clean -o allure-report

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to Netlify
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -e
          echo "Starting Netlify deploy..."
          DEPLOY_OUTPUT=$(npx netlify deploy --dir=allure-report --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN" --json)
          echo "$DEPLOY_OUTPUT"

          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => { try { const j = JSON.parse(d); console.log(j.deploy_url || j.url || ''); } catch { console.log(''); } });")

          if [ -n "$DEPLOY_URL" ]; then
            echo "Netlify deploy URL: $DEPLOY_URL"
            echo "NETLIFY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
            {
              echo "### Netlify Deploy"
              echo "$DEPLOY_URL"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
